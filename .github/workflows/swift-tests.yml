name: Swift Tests

on:
  push:
    branches:
      - main
      - feat/**
      - hermes/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Swift package tests
        run: swift test
